name: Check News

on:
  schedule:
    # 08:00 BRT = 11:00 UTC
    - cron: "0 11 * * *"
    # 13:00 BRT = 16:00 UTC
    - cron: "0 16 * * *"
    # 20:00 BRT = 23:00 UTC
    - cron: "0 23 * * *"
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  news:
    name: Fetch miles news
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Show configuration
        run: |
          echo "===== CONFIGURAÇÃO ====="
          echo "Feed 1: https://passageirodeprimeira.com/categorias/noticias/feed/"
          echo "Feed 2: https://passageirodeprimeira.com/categorias/promocoes/feed/"
          echo "Feed 3: https://pontospravoar.com/feed/"
          echo "Feed 4: https://mestredasmilhas.com/feed/"
          echo "TELEGRAM: ${{ secrets.TELEGRAM_BOT_TOKEN != '' && 'definido ✓' || 'NÃO definido ✗' }}"
          echo "========================"

      - name: Run news tracker
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: npx ts-node src/index-news.ts

      - name: Commit news-seen database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news-seen.json
          git diff --staged --quiet || git commit -m "chore: update news-seen [skip ci]"
          git push
