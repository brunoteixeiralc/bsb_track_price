name: Check News

on:
  schedule:
    # 08:00 BRT = 11:00 UTC
    - cron: "0 11 * * *"
    # 13:00 BRT = 16:00 UTC
    - cron: "0 16 * * *"
    # 20:00 BRT = 23:00 UTC
    - cron: "0 23 * * *"
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  news:
    name: Fetch miles news
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run news tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # variáveis abaixo não são usadas pelo news tracker,
          # mas config.ts exige que exista pelo menos um token Apify
          APIFY_API_TOKEN_1: ${{ secrets.APIFY_API_TOKEN_1 }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: npx ts-node src/index-news.ts

      - name: Commit news-seen database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news-seen.json
          git diff --staged --quiet || git commit -m "chore: update news-seen [skip ci]"
          git push
