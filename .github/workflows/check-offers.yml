name: Check Offers

on:
  schedule:
    - cron: "0 */2 * * *" # a cada 2 horas
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  offers:
    name: Fetch travel offers
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run offers tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npx ts-node src/index-offers.ts

      - name: Commit offers-seen database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/offers-seen.json
          git diff --staged --quiet || git commit -m "chore: update offers-seen [skip ci]"
          git push
