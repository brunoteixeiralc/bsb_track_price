name: Check Flights

on:
  schedule:
    # 08:00 BRT = 11:00 UTC
    - cron: "0 11 * * *"
    # 20:00 BRT = 23:00 UTC
    - cron: "0 23 * * *"
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  check:
    name: Check cheap flights
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run flight tracker
        env:
          APIFY_API_TOKEN_1: ${{ secrets.APIFY_API_TOKEN_1 }}
          APIFY_API_TOKEN_2: ${{ secrets.APIFY_API_TOKEN_2 }}
          APIFY_API_TOKEN_3: ${{ secrets.APIFY_API_TOKEN_3 }}
          APIFY_API_TOKEN_4: ${{ secrets.APIFY_API_TOKEN_4 }}
          APIFY_API_TOKEN_5: ${{ secrets.APIFY_API_TOKEN_5 }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ORIGIN: ${{ secrets.ORIGIN }}
          DESTINATIONS: ${{ secrets.DESTINATIONS }}
          DEPARTURE_DATE: ${{ secrets.DEPARTURE_DATE }}
          DATE_RANGE_DAYS: ${{ secrets.DATE_RANGE_DAYS }}
          TRIP_TYPE: ${{ secrets.TRIP_TYPE }}
          RETURN_DATE: ${{ secrets.RETURN_DATE }}
          MAX_PRICE_BRL: ${{ secrets.MAX_PRICE_BRL }}
          APIFY_ACTOR_ID: ${{ secrets.APIFY_ACTOR_ID }}
          RAPIDAPI_HOST: ${{ secrets.RAPIDAPI_HOST }}
        run: npx ts-node src/index.ts

      - name: Commit price history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.json data/health.json
          git diff --staged --quiet || git commit -m "chore: update price history [skip ci]"
          git push
