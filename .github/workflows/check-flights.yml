name: Check Flights

on:
  schedule:
    # 08:00 BRT = 11:00 UTC
    - cron: "0 11 * * *"
    # 20:00 BRT = 23:00 UTC
    - cron: "0 23 * * *"
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  check:
    name: Check cheap flights
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── Resumo de configuração (visível nos logs) ──────────────────────────
      # Secrets (tokens/chaves) não aparecem aqui por segurança.
      # Para saber quais tokens estão cadastrados, veja:
      #   GitHub → Settings → Secrets and variables → Actions → Secrets
      - name: Show configuration
        run: |
          echo "===== CONFIGURAÇÃO ====="
          echo "Rota:           ${{ vars.ORIGINS || vars.ORIGIN }} → ${{ vars.DESTINATIONS }}"
          echo "Tipo de viagem: ${{ vars.TRIP_TYPE || 'one-way' }}"
          echo "Preço máximo:   R$ ${{ vars.MAX_PRICE_BRL }}"
          echo "Data partida:   ${{ vars.DEPARTURE_DATE || 'hoje + offset' }} (offset: ${{ vars.DEPARTURE_DATE_OFFSET || '0' }} dia(s))"
          echo "Intervalo:      ${{ vars.DATE_RANGE_DAYS || '1' }} dia(s)"
          echo "Max escalas:    ${{ vars.MAX_STOPS || 'sem limite' }}"
          echo "Adults/Children: ${{ vars.ADULTS || '1' }}/${{ vars.CHILDREN || '0' }}"
          echo "Actor ID:       ${{ vars.APIFY_ACTOR_ID || 'padrão' }}"
          echo ""
          echo "Secrets configurados:"
          echo "  APIFY_API_TOKEN_1: ${{ secrets.APIFY_API_TOKEN_1 != '' && 'definido ✓' || 'NÃO definido ✗' }}"
          echo "  APIFY_API_TOKEN_2: ${{ secrets.APIFY_API_TOKEN_2 != '' && 'definido ✓' || 'não definido' }}"
          echo "  APIFY_API_TOKEN_3: ${{ secrets.APIFY_API_TOKEN_3 != '' && 'definido ✓' || 'não definido' }}"
          echo "  RAPIDAPI_KEY:      ${{ secrets.RAPIDAPI_KEY != '' && 'definido ✓' || 'NÃO definido ✗' }}"
          echo "  TELEGRAM:          ${{ secrets.TELEGRAM_BOT_TOKEN != '' && 'definido ✓' || 'NÃO definido ✗' }}"
          echo "========================"

      - name: Run flight tracker
        env:
          # ── Secrets (sensíveis — nunca visíveis nos logs) ──────────────────
          APIFY_API_TOKEN_1: ${{ secrets.APIFY_API_TOKEN_1 }}
          APIFY_API_TOKEN_2: ${{ secrets.APIFY_API_TOKEN_2 }}
          APIFY_API_TOKEN_3: ${{ secrets.APIFY_API_TOKEN_3 }}
          APIFY_API_TOKEN_4: ${{ secrets.APIFY_API_TOKEN_4 }}
          APIFY_API_TOKEN_5: ${{ secrets.APIFY_API_TOKEN_5 }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # ── Variables (configuração — visível em Settings > Variables) ─────
          ORIGINS: ${{ vars.ORIGINS }}
          ORIGIN: ${{ vars.ORIGIN }}
          DESTINATIONS: ${{ vars.DESTINATIONS }}
          DEPARTURE_DATE: ${{ vars.DEPARTURE_DATE }}
          DEPARTURE_DATE_OFFSET: ${{ vars.DEPARTURE_DATE_OFFSET }}
          DATE_RANGE_DAYS: ${{ vars.DATE_RANGE_DAYS }}
          TRIP_TYPE: ${{ vars.TRIP_TYPE }}
          RETURN_DATE: ${{ vars.RETURN_DATE }}
          MAX_PRICE_BRL: ${{ vars.MAX_PRICE_BRL }}
          ADULTS: ${{ vars.ADULTS }}
          CHILDREN: ${{ vars.CHILDREN }}
          MAX_STOPS: ${{ vars.MAX_STOPS }}
          AIRLINES_WHITELIST: ${{ vars.AIRLINES_WHITELIST }}
          MAX_DURATION_HOURS: ${{ vars.MAX_DURATION_HOURS }}
          APIFY_ACTOR_ID: ${{ vars.APIFY_ACTOR_ID }}
          RAPIDAPI_HOST: ${{ vars.RAPIDAPI_HOST }}
        run: npx ts-node src/index.ts

      - name: Commit price history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.db data/health.json
          git diff --staged --quiet || git commit -m "chore: update price history [skip ci]"
          git pull --rebase --autostash
          git push
