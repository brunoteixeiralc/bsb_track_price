name: Check Flights

on:
  schedule:
    # 08:00 BRT = 11:00 UTC
    - cron: "0 11 * * *"
    # 20:00 BRT = 23:00 UTC
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  check:
    name: Check cheap flights
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run flight tracker
        env:
          # Database (Turso)
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          
          # APIs & Telegram
          APIFY_API_TOKEN_1: ${{ secrets.APIFY_API_TOKEN_1 }}
          APIFY_API_TOKEN_2: ${{ secrets.APIFY_API_TOKEN_2 }}
          APIFY_API_TOKEN_3: ${{ secrets.APIFY_API_TOKEN_3 }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          
          # OpenRouter (IA)
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          
          # Configs padrões
          ORIGIN: ${{ vars.ORIGIN }}
          ORIGINS: ${{ vars.ORIGINS }}
          DESTINATIONS: ${{ vars.DESTINATIONS }}
          DEPARTURE_DATE_OFFSET: ${{ vars.DEPARTURE_DATE_OFFSET }}
          MAX_PRICE_BRL: ${{ vars.MAX_PRICE_BRL }}
        run: npx ts-node src/index.ts
